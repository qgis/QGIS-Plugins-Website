name: Build and Push Docker Image

on:
  push:
    tags:
      - '*'
  workflow_dispatch:   # Allows you to run this workflow manually from the Actions tab

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }} # Using token is recommended

    # Always publish the immutable, version-pinned tag (e.g. v3.3.0) that
    # production deploys reference. Only move the floating ':latest' tag for
    # real release tags pushed on a tag ref, never for manual/dispatch builds,
    # so production is always deployed by explicit version. See docs/RELEASING.md.
    - name: Build and push versioned image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: dockerize/docker/Dockerfile
        push: true
        tags: qgis/qgis-plugins-uwsgi:${{ github.ref_name }}

    - name: Update floating latest tag (release tags only)
      if: startsWith(github.ref, 'refs/tags/')
      uses: docker/build-push-action@v6
      with:
        context: .
        file: dockerize/docker/Dockerfile
        push: true
        tags: qgis/qgis-plugins-uwsgi:latest

    - name: Log out from Docker Hub
      run: docker logout
