{% extends "base.html" %}
{% load i18n static %}

{% block pagetitle %}
<section class="hero is-dark is-medium has-bg-img" style="background: url({% static 'images/hegobg1.webp' %});
background-position: 50%;
background-size: cover;">
  <div class="hero-body" style="min-height: 100dvh; display: flex; align-items: center;">
    <div class="columns is-vcentered is-centered" style="width: 100%;">
      <div class="column is-5-tablet is-4-desktop p-0">
        <div class="login-container p-6 has-text-centered">
          <figure class="image is-64x64 is-inline-block mb-4">
            <img src="{% static 'images/qgis-icon128.png' %}" alt="QGIS" style="border-radius: 12px;">
          </figure>

          <h3 class="title">{% trans "Sign Out" %}</h3>
          <hr class="login-hr" />
          <p class="subtitle">
            {% trans "Are you sure you want to sign out?" %}
          </p>

          <form method="POST" action="{% url 'account_logout' %}">
            {% csrf_token %}
            <div class="buttons is-centered">
              <button type="submit" class="button is-danger is-medium">
                <span class="icon"><i class="fas fa-sign-out-alt"></i></span>
                <span>{% trans "Sign Out" %}</span>
              </button>
              <a href="/" class="button is-light is-medium">
                <span>{% trans "Cancel" %}</span>
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
